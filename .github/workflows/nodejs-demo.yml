name: Nodejs demo

on:
  push:
    branches: 
     - develop
    paths:
      - 'Nodejs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    name: Node sample
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: node --version
      - run: npm install -g bats
      - run: bats -v